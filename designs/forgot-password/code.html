            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Transactional Page: Navigation suppressed as per Shell Visibility Rule -->
<main class="w-full max-w-md">
<!-- Brand Header - Intentional Asymmetry -->
<div class="mb-10 text-center md:text-left md:pl-2">
<div class="inline-flex items-center gap-2 mb-6">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
</div>
<span class="font-headline font-extrabold text-xl tracking-tighter text-primary">Academic Sanctuary</span>
</div>
<h1 class="font-headline font-bold text-3xl text-on-surface tracking-tight mb-3">Restore Focus</h1>
<p class="text-on-surface-variant leading-relaxed max-w-xs mx-auto md:mx-0">Enter your email and we'll send instructions to reset your workspace access.</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-8 md:p-10 premium-glow relative overflow-hidden">
<!-- Subtle Tonal Background Element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary-container/30 rounded-full blur-3xl opacity-50"></div>
<form action="#" class="space-y-8 relative z-10">
<div>
<label class="block font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-3 ml-1" for="email">Work Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-xl px-5 py-4 text-on-surface placeholder:text-outline focus:ring-0 focus:outline-none transition-all duration-300 soft-inset-shadow peer" id="email" name="email" placeholder="curator@sanctuary.edu" required="" type="email"/>
<!-- Focus Indigo Bottom Bar (Design System Spec) -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-secondary transition-all duration-300 peer-focus:w-full"></div>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-surface-variant/30 text-center">
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-secondary font-medium transition-colors duration-200 group" href="/login">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform" data-icon="keyboard_backspace">keyboard_backspace</span>
<span class="text-sm">Back to login</span>
</a>
</div>
</div>
<!-- Semantic Footer / Meta Content -->
<footer class="mt-12 text-center">
<p class="text-xs text-outline font-medium tracking-wide">
                © 2024 Study Sanctuary • Secure Protocol 4.2
            </p>
<div class="mt-4 flex justify-center gap-6">
<a class="text-xs text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Support Center</a>
</div>
</footer>
</main>
<!-- Decorative Background Visuals -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30%] h-[30%] rounded-full bg-primary-container/10 blur-[100px]"></div>
</div>
